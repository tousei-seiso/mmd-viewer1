<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- スマホで等倍表示・ピンチズーム無効化（3D操作とブラウザズームの競合を防ぐ） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MMD Viewer</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Three.js 本体と addons を CDN から読み込む（ES Modules / Import Map） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- 3D 空間（ステージ）を描画するコンテナ。画面全体に広げる -->
  <div id="viewer"></div>

  <!-- 読み込み状況などをユーザーに伝えるオーバーレイ -->
  <div id="overlay">
    <p id="status">モデルを読み込んでいます…</p>
  </div>

  <!-- 画面最上部中央のステータス表示（曲名・読み込み状況）。タップを邪魔しない。 -->
  <div id="now-playing">🎵 モーション未選択</div>

  <!-- 診断表示（ボーン数・揺れ量）の ON/OFF を切り替えるアイコンボタン（画面右上） -->
  <button id="debug-toggle" type="button" title="診断表示の切り替え" aria-pressed="false">📊</button>

  <!-- モデル選択ダイアログを開くフォルダアイコン（診断アイコンの下） -->
  <button id="model-picker-toggle" type="button" title="モデルを選択" aria-haspopup="dialog" aria-expanded="false">📁</button>

  <!-- 画面の向きを縦（ポートレート）に固定／解除するトグル（モデル選択アイコンの下） -->
  <button id="orientation-lock-toggle" type="button" title="画面の向きを縦に固定" aria-pressed="false">🔓</button>

  <!-- カメラを正面・全身が見える位置へリセットするアイコン（向き固定アイコンの下） -->
  <button id="reset-view-toggle" type="button" title="正面・全身が見えるようにリセット">🧍</button>

  <!-- ダンスモーション選択ダイアログを開く音符アイコン（カメラリセットアイコンの下） -->
  <button id="motion-picker-toggle" type="button" title="ダンスモーションを選択" aria-haspopup="dialog" aria-expanded="false">🎵</button>

  <!-- ダンス再生／一時停止アイコン（音符アイコンの下）。
       モデルとモーションの両方が揃うまでは disabled で半透明・タップ不可。 -->
  <button id="dance-play-toggle" type="button" title="ダンスを再生" disabled>▶️</button>

  <!-- 停止アイコン（再生アイコンの下）。再生を止めて先頭(0秒)へ戻す。再生中のみ押せる。 -->
  <button id="dance-stop-toggle" type="button" title="停止して先頭へ戻す" disabled>⏹️</button>

  <!-- 本格物理（Ammo.js）ON/OFF トグル（停止アイコンの下）。
       ON 時に初めて Ammo.js を動的ロードする。ON 中は簡易揺れ(sway)を止めて物理に委ねる。 -->
  <button id="physics-toggle" type="button" title="本格物理（揺れ）をON/OFF" aria-pressed="false">🎐</button>

  <!-- 背景・床の色を変えるパレットアイコン（物理アイコンの下）。クリックで色パネルを開閉。 -->
  <button id="color-picker-toggle" type="button" title="背景・床の色を変更" aria-expanded="false">🎨</button>

  <!-- 現在の3D画面をPNGとしてサイレント保存するスクリーンショットアイコン（パレットアイコンの下）。
       クリックで ui.js の setupScreenshot() → view3d.js の takeScreenshot() が呼ばれる。 -->
  <button id="screenshot-toggle" type="button" title="スクリーンショットを保存">📷</button>

  <!-- AR（背面カメラ）ON/OFF トグル（スクリーンショットアイコンの下）。
       ON にすると通常の背景・床/グリッドを描画せず、スマホ背面カメラの映像を背景として
       リアルタイム表示し、その中にモデルを重ねて表示する（view3d.js の setArEnabled）。 -->
  <button id="ar-toggle" type="button" title="AR（背面カメラ）背景をON/OFF" aria-pressed="false">📹</button>

  <!-- 光源設定パネルを開く電球アイコン（AR アイコンの下）。クリックでライトパネルを開閉。
       指向性光源（太陽）と環境光の色・強度・向き、および光の追従モードを調整する。 -->
  <button id="light-toggle" type="button" title="光源（ライト）を調整" aria-expanded="false">💡</button>

  <!-- 光源ヘルパー（DirectionalLightHelper）の表示 ON/OFF トグル（電球アイコンの下）。
       光源の位置・向きを線で可視化し、モデル追従で光源が回っているか目視確認するためのもの。 -->
  <button id="light-helper-toggle" type="button" title="光源ヘルパー（向き可視化）をON/OFF" aria-pressed="true">🔦</button>

  <!-- カメラ追従 ON/OFF トグル（2列目の 4 段目）。ON にすると光源追従と同じ手法で
       モデルの向き（facing Yaw）にカメラの周回角を追従させ、モデルが回っても同じ相対
       位置から見続ける。設定は下の ⚙️ カメラ設定パネルの追従スイッチと同期する。 -->
  <button id="camera-follow-toggle" type="button" title="カメラ追従をON/OFF" aria-pressed="false">🎥</button>

  <!-- カメラ設定パネルを開く歯車アイコン（2列目の 5 段目）。クリックでカメラパネルを開閉。
       方位角・仰角・モデルまでの距離・カメラ追従の ON/OFF を調整する。 -->
  <button id="camera-settings-toggle" type="button" title="カメラ設定（方位角・仰角・距離・追従）" aria-expanded="false">⚙️</button>

  <!-- 設定保存アイコン（フロッピー）。現在の光源・カメラ追従・物理ON/OFF・背景/床の色・
       光源ヘルパーON/OFF を JSON にまとめてブラウザの localStorage に保存する（固定1件）。 -->
  <button id="settings-save-toggle" type="button" title="現在の設定を保存">💾</button>

  <!-- 設定読み込みアイコン（フォルダ）。localStorage に保存した設定を読み込んで、
       各コントロール（光源・カメラ・物理・色・ヘルパー）へ反映する。 -->
  <button id="settings-load-toggle" type="button" title="保存した設定を読み込む">📂</button>

  <!-- AR 背景用のカメラ映像。THREE.VideoTexture のソースにするためだけの要素で、
       画面には表示しない（style.css で不可視化）。iOS Safari はテクスチャ化のため
       display:none を嫌うので、画面外へ寄せて事実上見えないようにしている。
       muted/playsinline は自動再生（ユーザー操作起点）の前提条件。 -->
  <video id="ar-video" playsinline muted></video>

  <!-- 色変更パネル（HTML5 標準カラーピッカー。背景＝scene.background / 床＝床メッシュの色） -->
  <div id="color-panel" class="hidden">
    <label class="color-row">
      <span>背景</span>
      <input type="color" id="bg-color" value="#223344" />
    </label>
    <label class="color-row">
      <span>床</span>
      <input type="color" id="floor-color" value="#335577" />
    </label>
  </div>

  <!-- 光源設定パネル（💡）。指向性光源（太陽）と環境光を調整する。
       各コントロールは ui.js の setupLightPanel() で LightController(view3d.js) に配線される。 -->
  <div id="light-panel" class="hidden">
    <div class="light-section-title">指向性光源（太陽）</div>
    <label class="light-row">
      <span>方位角</span>
      <input type="range" id="light-azimuth" min="0" max="360" step="1" value="45" />
      <output id="light-azimuth-val">45°</output>
    </label>
    <label class="light-row">
      <span>仰角</span>
      <input type="range" id="light-elevation" min="0" max="90" step="1" value="45" />
      <output id="light-elevation-val">45°</output>
    </label>
    <label class="light-row">
      <span>強度</span>
      <input type="range" id="light-dir-intensity" min="0" max="3" step="0.05" value="1.2" />
      <output id="light-dir-intensity-val">1.20</output>
    </label>
    <label class="light-row">
      <span>色</span>
      <input type="color" id="light-dir-color" value="#ffffff" />
    </label>

    <div class="light-section-title">環境光</div>
    <label class="light-row">
      <span>強度</span>
      <input type="range" id="light-amb-intensity" min="0" max="3" step="0.05" value="0.6" />
      <output id="light-amb-intensity-val">0.60</output>
    </label>
    <label class="light-row">
      <span>色</span>
      <input type="color" id="light-amb-color" value="#ffffff" />
    </label>

    <div class="light-section-title">ライティングモード</div>
    <label class="light-row light-mode-row">
      <span id="light-mode-label">世界固定（太陽光）</span>
      <input type="checkbox" id="light-mode-toggle" role="switch" aria-checked="false" />
    </label>
  </div>

  <!-- カメラ設定パネル（⚙️）。方位角・仰角・モデルまでの距離・カメラ追従を調整する。
       各コントロールは ui.js の setupCameraControls() で view3d.js のカメラ用 setter へ
       配線される。方位角・仰角は「既定の正面構図（リセット位置）からのオフセット角」で、
       画面をドラッグすると自動的にこのスライダー値へ追従する。 -->
  <div id="camera-panel" class="hidden">
    <div class="light-section-title">カメラ</div>
    <label class="light-row">
      <span>方位角</span>
      <input type="range" id="camera-azimuth" min="0" max="360" step="1" value="0" />
      <output id="camera-azimuth-val">0°</output>
    </label>
    <label class="light-row">
      <span>仰角</span>
      <input type="range" id="camera-elevation" min="-74" max="74" step="1" value="0" />
      <output id="camera-elevation-val">0°</output>
    </label>
    <label class="light-row">
      <span>距離</span>
      <input type="range" id="camera-distance" min="5" max="80" step="1" value="30" />
      <output id="camera-distance-val">30</output>
    </label>

    <div class="light-section-title">カメラ追従</div>
    <label class="light-row light-mode-row">
      <span id="camera-follow-label">追従OFF</span>
      <input type="checkbox" id="camera-follow-check" role="switch" aria-checked="false" />
    </label>
  </div>

  <!-- モデル選択ダイアログ（models フォルダ内の .pmx / .pmd を一覧表示） -->
  <div id="model-dialog" class="hidden" role="dialog" aria-modal="true" aria-label="モデルを選択">
    <div id="model-dialog-panel">
      <div id="model-dialog-header">
        <span>モデルを選択</span>
        <button id="model-dialog-close" type="button" aria-label="閉じる">✕</button>
      </div>
      <ul id="model-list"></ul>
    </div>
  </div>

  <!-- ダンスモーション選択ダイアログ（motions フォルダ内の各曲フォルダを一覧表示） -->
  <div id="motion-dialog" class="hidden" role="dialog" aria-modal="true" aria-label="ダンスモーションを選択">
    <div id="motion-dialog-panel">
      <div id="motion-dialog-header">
        <span>ダンスモーションを選択</span>
        <button id="motion-dialog-close" type="button" aria-label="閉じる">✕</button>
      </div>
      <ul id="motion-list"></ul>
    </div>
  </div>

  <!-- 再生位置バー（画面下部）。ダンス読み込み中に表示。つまみドラッグでシーク可能。 -->
  <div id="seek-bar" class="hidden">
    <span id="seek-time-current">00:00</span>
    <div id="seek-track" role="slider" aria-label="再生位置" tabindex="0">
      <div id="seek-fill"></div>
      <div id="seek-thumb"></div>
    </div>
    <span id="seek-time-total">00:00</span>
  </div>

  <!-- ?v= はキャッシュ破棄用。更新時に番号を上げると確実に最新JSが読み込まれる。 -->
  <script type="module" src="main.js?v=17"></script>
</body>
</html>
