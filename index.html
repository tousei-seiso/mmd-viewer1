<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- スマホで等倍表示・ピンチズーム無効化（3D操作とブラウザズームの競合を防ぐ） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MMD Viewer</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Three.js 本体と addons を CDN から読み込む（ES Modules / Import Map） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- [一時デバッグ] 実機ではコンソールが見られないため、初期化中の例外（モジュール評価
       失敗・未処理 Promise 拒否）を画面上の #status へ可視化する。原因特定後に削除する。 -->
  <script>
    (function () {
      function show(msg) {
        var el = document.getElementById('status');
        if (el) { el.classList.remove('hidden'); el.textContent = '⚠ ' + msg; }
      }
      window.addEventListener('error', function (e) {
        var where = (e.filename || '').split('/').pop();
        show((e.message || 'error') + ' @ ' + where + ':' + e.lineno + ':' + e.colno);
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        show('promise: ' + ((r && (r.message || r.stack)) || r));
      });
    })();
  </script>
</head>
<body>
  <!-- 3D 空間（ステージ）を描画するコンテナ。画面全体に広げる -->
  <div id="viewer"></div>

  <!-- 読み込み状況などをユーザーに伝えるオーバーレイ -->
  <div id="overlay">
    <p id="status">モデルを読み込んでいます…</p>
  </div>

  <!-- 画面最上部中央のステータス表示（曲名・読み込み状況）。タップを邪魔しない。 -->
  <div id="now-playing">🎵 モーション未選択</div>

  <!-- 診断表示（ボーン数・揺れ量）の ON/OFF を切り替えるアイコンボタン（画面右上） -->
  <button id="debug-toggle" type="button" title="診断表示の切り替え" aria-pressed="false">📊</button>

  <!-- モデル選択ダイアログを開くフォルダアイコン（診断アイコンの下） -->
  <button id="model-picker-toggle" type="button" title="モデルを選択" aria-haspopup="dialog" aria-expanded="false">📁</button>

  <!-- 画面の向きを縦（ポートレート）に固定／解除するトグル（モデル選択アイコンの下） -->
  <button id="orientation-lock-toggle" type="button" title="画面の向きを縦に固定" aria-pressed="false">🔓</button>

  <!-- カメラを正面・全身が見える位置へリセットするアイコン（向き固定アイコンの下） -->
  <button id="reset-view-toggle" type="button" title="正面・全身が見えるようにリセット">🧍</button>

  <!-- ダンスモーション選択ダイアログを開く音符アイコン（カメラリセットアイコンの下） -->
  <button id="motion-picker-toggle" type="button" title="ダンスモーションを選択" aria-haspopup="dialog" aria-expanded="false">🎵</button>

  <!-- ダンス再生／一時停止アイコン（音符アイコンの下）。
       モデルとモーションの両方が揃うまでは disabled で半透明・タップ不可。 -->
  <button id="dance-play-toggle" type="button" title="ダンスを再生" disabled>▶️</button>

  <!-- 停止アイコン（再生アイコンの下）。再生を止めて先頭(0秒)へ戻す。再生中のみ押せる。 -->
  <button id="dance-stop-toggle" type="button" title="停止して先頭へ戻す" disabled>⏹️</button>

  <!-- 本格物理（Ammo.js）ON/OFF トグル（停止アイコンの下）。
       ON 時に初めて Ammo.js を動的ロードする。ON 中は簡易揺れ(sway)を止めて物理に委ねる。 -->
  <button id="physics-toggle" type="button" title="本格物理（揺れ）をON/OFF" aria-pressed="false">🎐</button>

  <!-- 背景・床の色を変えるパレットアイコン（物理アイコンの下）。クリックで色パネルを開閉。 -->
  <button id="color-picker-toggle" type="button" title="背景・床の色を変更" aria-expanded="false">🎨</button>

  <!-- 現在の3D画面をPNGとしてサイレント保存するスクリーンショットアイコン（パレットアイコンの下）。
       クリックで ui.js の setupScreenshot() → view3d.js の takeScreenshot() が呼ばれる。 -->
  <button id="screenshot-toggle" type="button" title="スクリーンショットを保存">📷</button>

  <!-- 色変更パネル（HTML5 標準カラーピッカー。背景＝scene.background / 床＝床メッシュの色） -->
  <div id="color-panel" class="hidden">
    <label class="color-row">
      <span>背景</span>
      <input type="color" id="bg-color" value="#223344" />
    </label>
    <label class="color-row">
      <span>床</span>
      <input type="color" id="floor-color" value="#335577" />
    </label>
  </div>

  <!-- モデル選択ダイアログ（models フォルダ内の .pmx / .pmd を一覧表示） -->
  <div id="model-dialog" class="hidden" role="dialog" aria-modal="true" aria-label="モデルを選択">
    <div id="model-dialog-panel">
      <div id="model-dialog-header">
        <span>モデルを選択</span>
        <button id="model-dialog-close" type="button" aria-label="閉じる">✕</button>
      </div>
      <ul id="model-list"></ul>
    </div>
  </div>

  <!-- ダンスモーション選択ダイアログ（motions フォルダ内の各曲フォルダを一覧表示） -->
  <div id="motion-dialog" class="hidden" role="dialog" aria-modal="true" aria-label="ダンスモーションを選択">
    <div id="motion-dialog-panel">
      <div id="motion-dialog-header">
        <span>ダンスモーションを選択</span>
        <button id="motion-dialog-close" type="button" aria-label="閉じる">✕</button>
      </div>
      <ul id="motion-list"></ul>
    </div>
  </div>

  <!-- 再生位置バー（画面下部）。ダンス読み込み中に表示。つまみドラッグでシーク可能。 -->
  <div id="seek-bar" class="hidden">
    <span id="seek-time-current">00:00</span>
    <div id="seek-track" role="slider" aria-label="再生位置" tabindex="0">
      <div id="seek-fill"></div>
      <div id="seek-thumb"></div>
    </div>
    <span id="seek-time-total">00:00</span>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
